name: CI Pipeline

on:
  push:
    branches:
      - main
      - feature/*


env:                            # global env vars
  JAVA_VERSION: '17'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docker-learn-app
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
      - name: Build
        run: mvn -B package --no-transfer-progress